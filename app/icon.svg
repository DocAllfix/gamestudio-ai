<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" shape-rendering="crispEdges">
  <!-- Favicon: bold, fills the frame, legible at 16-32px. Dark rounded bg,
       pixel anvil in warm white, forge spark. Purpose-built (not the big logo). -->
  <rect width="32" height="32" rx="7" fill="#0E0F12"/>
  <!-- Anvil top (work surface) -->
  <rect x="6" y="13" width="17" height="3" fill="#F5F3F0"/>
  <!-- Anvil horn (left taper) -->
  <rect x="4" y="14" width="3" height="2" fill="#F5F3F0"/>
  <!-- Anvil waist -->
  <rect x="12" y="16" width="7" height="4" fill="#F5F3F0"/>
  <!-- Anvil base -->
  <rect x="9" y="20" width="13" height="3" fill="#F5F3F0"/>
  <rect x="8" y="23" width="15" height="2" fill="#F5F3F0"/>
  <!-- Forge sparks (top-right) -->
  <rect x="24" y="6" width="2" height="2" fill="#F5582B"/>
  <rect x="27" y="9" width="2" height="2" fill="#F5582B"/>
  <rect x="23" y="10" width="2" height="2" fill="#FFB020"/>
  <rect x="26" y="5" width="2" height="2" fill="#FFB020"/>
</svg>
